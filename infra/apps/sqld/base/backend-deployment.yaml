apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqld-backend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: sqld-backend
  template:
    metadata:
      labels:
        app: sqld-backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: oracle-wallet
          secret:
            secretName: oracle-wallet
      containers:
        - name: sqld-backend
          image: ghcr.io/beolle/sqld-backend:sha-39e0c23
          imagePullPolicy: Always
          command:
            - /app/.venv/bin/python
          args:
            - -m
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --workers
            - "2"
          ports:
            - containerPort: 8000
          env:
            - name: ORACLE_WALLET_PATH
              value: /app/wallet
          envFrom:
            - secretRef:
                name: oracle-db-secret
            - secretRef:
                name: postgres-db-secret
            - secretRef:
                name: backend-auth-secret
          volumeMounts:
            - name: oracle-wallet
              mountPath: /app/wallet
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 8Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
