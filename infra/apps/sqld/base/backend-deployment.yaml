apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqld-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqld-backend
  template:
    metadata:
      labels:
        app: sqld-backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: oracle-wallet
          secret:
            secretName: oracle-wallet
      containers:
        - name: sqld-backend
          image: ghcr.io/beolle/sqld-backend:sha-35f8385
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: ORACLE_WALLET_PATH
              value: /app/wallet
          envFrom:
            - secretRef:
                name: oracle-db-secret
            - secretRef:
                name: postgres-db-secret
            - secretRef:
                name: backend-auth-secret
          volumeMounts:
            - name: oracle-wallet
              mountPath: /app/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
