apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sqld-frontend
spec:
  parentRefs:
    - name: sqld-gateway
      namespace: app
  hostnames:
    - test-dummies.selfronny.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: sqld-frontend
          port: 80
