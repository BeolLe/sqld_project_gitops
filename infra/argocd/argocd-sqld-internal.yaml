apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sqld-internal
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/BeolLe/sqld_project_gitops
    targetRevision: main
    path: infra/apps/sqld/overlays/internal

  destination:
    server: https://kubernetes.default.svc
    namespace: app-internal

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
