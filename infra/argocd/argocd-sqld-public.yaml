apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sqld-public
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/BeolLe/sqld_project_gitops
    targetRevision: main
    path: infra/apps/sqld/overlays/public

  destination:
    server: https://kubernetes.default.svc
    namespace: app-public

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
