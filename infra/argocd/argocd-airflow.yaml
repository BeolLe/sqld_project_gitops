apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: 1.19.0
      helm:
        releaseName: airflow
        valueFiles:
          - $values/infra/airflow/values.yaml
    - repoURL: https://github.com/BeolLe/sqld_project_gitops
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: pipeline

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
