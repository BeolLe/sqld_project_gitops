apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sqld-frontend
  namespace: app
spec:
  parentRefs:
    - name: sqld-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: sqld-frontend
          port: 80
