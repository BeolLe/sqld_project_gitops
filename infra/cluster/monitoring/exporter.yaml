apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: db
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
      - name: postgres-exporter
        image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
        ports:
        - name: http
          containerPort: 9187
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://exporter:gustjr_exporter@pg-archive-postgresql.db.svc.cluster.local:5432/postgres?sslmode=disable"
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: db
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
  - name: http
    port: 9187
    targetPort: http
