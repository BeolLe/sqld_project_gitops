apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-private
  namespace: infra
  labels:
    app: cloudflared-private
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared-private
  template:
    metadata:
      labels:
        app: cloudflared-private
    spec:
      containers:
        - name: cloudflared-private
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --protocol
            - quic
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tunnel-credentials-private
                  key: private-tunnel-token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
