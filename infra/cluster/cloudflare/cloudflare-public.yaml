apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-public
  namespace: infra
  labels:
    app: cloudflared-public
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared-public
  template:
    metadata:
      labels:
        app: cloudflared-public
    spec:
      containers:
        - name: cloudflared-public
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tunnel-credentials-public
                  key: public-tunnel-token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
